<html lang="en">
<head>
<meta charset="UTF-8"/>

<title>CMDA 2k29 UI — Access Required</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(160deg,#0F3D22 0%,#1A6B3A 60%,#2A8A4E 100%);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  padding:20px;
}
.gate-card{
  background:white;border-radius:16px;padding:40px 36px;
  max-width:400px;width:100%;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
}
.cross{font-size:36px;margin-bottom:12px}
h1{font-family:'DM Serif Display',serif;font-size:24px;color:#0F3D22;margin-bottom:6px}
.org{font-size:12px;color:#5A7060;letter-spacing:0.5px;margin-bottom:4px}
.motto{font-size:11px;font-style:italic;color:#5A7060;margin-bottom:28px;line-height:1.5}
label{display:block;font-size:11px;font-weight:700;color:#5A7060;letter-spacing:0.8px;text-transform:uppercase;text-align:left;margin-bottom:6px}
input{
  width:100%;border:1.5px solid #D0E4D8;border-radius:8px;
  padding:12px 14px;font-family:'Inter',sans-serif;font-size:15px;
  color:#0F3D22;background:#F6FAF7;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
  letter-spacing:2px;text-align:center;
}
input:focus{border-color:#1A6B3A;box-shadow:0 0 0 3px rgba(26,107,58,0.12);background:white}
.btn{
  width:100%;background:#1A6B3A;color:white;border:none;
  padding:14px;border-radius:8px;font-family:'Inter',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
  margin-top:16px;transition:all 0.2s;letter-spacing:0.3px;
}
.btn:hover{background:#0F3D22;transform:translateY(-1px)}
.error{
  background:#FEF2F2;border:1px solid #FECACA;border-radius:7px;
  color:#B03A2E;font-size:13px;padding:10px;margin-top:12px;
  display:none;
}
.lock-note{font-size:11px;color:#5A7060;margin-top:16px;line-height:1.5}
</style>
</head>
